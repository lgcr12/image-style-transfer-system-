<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>本地记录 - 晶体实验室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/history_crystal.css?v=20260424-history-eco" />
  </head>
  <body class="page-history">
    <div class="app-container">
      <header class="history-header">
        <div class="header-inner">
          <div class="title-group">
            <p class="kicker">LOCALLY STORED</p>
            <h1><span class="icon">◈</span> 本地记录</h1>
            <p class="desc">按日期查看最近生成的风格迁移与 SD 结果，点击卡片可快速预览或复用参数。</p>
          </div>
          <nav class="nav-pill-group" aria-label="页面导航">
            <a href="/" class="nav-pill">风格迁移</a>
            <a href="/sd" class="nav-pill">SD 重绘</a>
          </nav>
        </div>
      </header>

      <main class="history-main">
        <section class="filter-section">
          <div class="filter-glass-pill">
            <select id="history-filter-mode" aria-label="筛选模式">
              <option value="">全部模式</option>
              <option value="style">风格迁移</option>
              <option value="sd">SD 重绘</option>
            </select>
            <input id="history-filter-q" type="text" placeholder="搜索关键词..." />
            <button id="history-filter-apply" class="apply-btn" type="button">筛选</button>
            <button id="history-filter-reset" class="reset-btn" type="button">重置</button>
          </div>
        </section>

        <div id="history-wall" class="history-grid" aria-live="polite"></div>
      </main>

      <footer class="history-footer">
        <p>数据仅保存在浏览器本地 IndexedDB / LocalStorage</p>
      </footer>
    </div>

    <script src="/static/history_local.js?v=20260424-history-eco"></script>
    <script src="/static/history_page.js?v=20260424-history-eco"></script>
    <script>
      document.addEventListener("mousemove", (event) => {
        const x = (event.clientX / window.innerWidth) * 100;
        const y = (event.clientY / window.innerHeight) * 100;
        document.body.style.backgroundImage = `
          radial-gradient(at ${x}% ${y}%, rgba(34, 197, 94, 0.12) 0px, transparent 50%),
          radial-gradient(at 10% 10%, rgba(34, 197, 94, 0.08) 0px, transparent 45%),
          radial-gradient(at 90% 90%, rgba(16, 185, 129, 0.08) 0px, transparent 45%)
        `;
      });

      const ecoObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            entry.target.style.opacity = "1";
            entry.target.style.transform = "translateY(0) rotate(0deg)";
            ecoObserver.unobserve(entry.target);
          });
        },
        { threshold: 0.1 }
      );

      const observeHistoryItems = () => {
        document.querySelectorAll(".history-item").forEach((item) => {
          if (item.dataset.ecoObserved === "1") return;
          item.dataset.ecoObserved = "1";
          item.style.opacity = "0";
          item.style.transform = "translateY(30px) rotate(1deg)";
          item.style.transition = "opacity 0.6s ease, transform 0.6s ease";
          ecoObserver.observe(item);
        });
      };

      const wall = document.getElementById("history-wall");
      if (wall) {
        const mutationObserver = new MutationObserver(() => observeHistoryItems());
        mutationObserver.observe(wall, { childList: true, subtree: true });
      }

      observeHistoryItems();
    </script>
  </body>
</html>
