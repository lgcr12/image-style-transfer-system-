<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="view-transition" content="same-origin" />
    <title>本地记录 - 生态实验室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/history_crystal.css?v=20260425_eco12" />
  </head>
  <body class="page-history page-history-eco is-page-entering">
    <div class="page-transition-overlay" id="overlay-history" aria-hidden="true">
      <div class="organic-bloom-shell"></div>
    </div>
    <div id="weather-particles" class="weather-particles-overlay"></div>

    <div class="app-container">
      <header class="history-header">
        <div class="header-inner">
          <div class="title-group">
            <p class="kicker history-page-kicker">LOCALLY STORED</p>
            <h1><span class="icon history-page-title-icon">◈</span> 本地记录</h1>
            <p class="desc">按日期查看最近生成的风格迁移与 SD 结果，点击卡片可快速预览、复用参数或重新打开结果页。</p>
          </div>
          <nav class="nav-pill-group history-nav-pills" aria-label="页面导航">
            <a href="/" class="nav-pill history-nav-pill">风格迁移</a>
            <a href="/sd" class="nav-pill history-nav-pill">SD 重绘</a>
          </nav>
        </div>
      </header>

      <div class="eco-status-bar" aria-label="环境状态">
        <div class="status-item">
          <span class="status-dot"></span>
          <span class="status-label">环境状态:</span>
          <span class="status-value">光合作用中</span>
        </div>
        <div class="status-item">
          <span class="status-label">本地样本数:</span>
          <span id="sample-count" class="status-value">--</span>
        </div>
      </div>

      <main class="history-main-container">
        <aside class="eco-sidebar-left">
          <div class="timeline-glass-card">
            <h4>样本目录</h4>
            <div id="history-timeline" class="eco-timeline"></div>
          </div>
        </aside>

        <section class="history-content-wall">
          <section class="filter-section">
            <div class="filter-glass-pill">
              <select id="history-filter-mode" aria-label="筛选模式">
                <option value="">全部模式</option>
                <option value="style">风格迁移</option>
                <option value="sd">SD 重绘</option>
              </select>
              <input id="history-filter-q" type="text" placeholder="搜索关键词..." />
              <button id="history-filter-apply" class="apply-btn" type="button">筛选</button>
              <button id="history-filter-reset" class="reset-btn" type="button">重置</button>
            </div>
          </section>

          <div id="history-wall" class="history-grid" aria-live="polite"></div>
        </section>

        <aside class="eco-sidebar-right">
          <div class="stats-glass-card">
            <div class="stat-row">
              <span class="label">光合速率</span>
              <div class="progress-bar"><div class="fill"></div></div>
            </div>
            <div class="stat-row">
              <span class="label">变异频率</span>
              <span class="value">0.02%</span>
            </div>
          </div>
        </aside>
      </main>

      <footer class="history-footer">
        <p>数据仅保存在浏览器本地 IndexedDB / LocalStorage</p>
      </footer>
    </div>

    <div class="weather-monitor" aria-live="polite">
      <div class="weather-icon" id="w-icon">--</div>
      <div class="weather-info">
        <span id="w-text">环境扫描中...</span>
        <span id="w-temp">--°C</span>
      </div>
    </div>

    <script src="/static/history_local.js?v=20260425_eco12"></script>
    <script src="/static/history_page.js?v=20260425_eco12"></script>
    <script>
      function smoothNavigateLocalHistory(url) {
        if (!url || document.body.classList.contains("is-page-leaving")) return;
        document.body.classList.add("is-page-leaving");
        window.setTimeout(() => {
          window.location.href = url;
        }, 1200);
      }

      document.querySelectorAll(".history-nav-pill").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          smoothNavigateLocalHistory(link.getAttribute("href"));
        });
      });

      document.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        document.body.style.setProperty("--mouse-x", `${x}%`);
        document.body.style.setProperty("--mouse-y", `${y}%`);
      });

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
            }
          });
        },
        { threshold: 0.1 }
      );

      const observeHistoryItems = () => {
        document.querySelectorAll(".history-item").forEach((item) => {
          if (item.dataset.ecoObserved === "1") return;
          item.dataset.ecoObserved = "1";
          observer.observe(item);
        });
      };

      const wall = document.getElementById("history-wall");
      if (wall) {
        const mutationObserver = new MutationObserver(() => observeHistoryItems());
        mutationObserver.observe(wall, { childList: true, subtree: true });
      }

      observeHistoryItems();
    </script>
  </body>
</html>
